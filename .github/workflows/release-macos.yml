# Build SISR.app per architecture (Intel + Apple Silicon), sign with Developer ID,
# notarize with App Store Connect API, attach stapled zips to the GitHub Release for tag v*.

name: Release (macOS)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-macos-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-macos:
    # PyInstaller + deps + notary (default NOTARY_WAIT_TIMEOUT=25m in script) + zip; unrelated hangs fail fast.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel: use macos-*-intel — macos-13 was retired and no longer provisions runners.
          - runner: macos-15-intel
            arch: x86_64
          - runner: macos-15
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Executable bit (release script)
        run: chmod +x scripts/release/macos-build-sign-notarize.sh

      - name: Import Developer ID certificate (tag release only)
        if: github.event_name == 'push'
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${MACOS_CERTIFICATE_BASE64:-}" ]]; then
            echo "::error::Missing secret MACOS_CERTIFICATE_BASE64. See scripts/release/README.md"
            exit 1
          fi
          KEYCHAIN_PATH="${RUNNER_TEMP}/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"
          echo "KEYCHAIN_PASSWORD=${KEYCHAIN_PASSWORD}" >> "${GITHUB_ENV}"
          echo "${MACOS_CERTIFICATE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/certificate.p12"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${RUNNER_TEMP}/certificate.p12" -k "${KEYCHAIN_PATH}" -P "${MACOS_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychain -d user -s "${KEYCHAIN_PATH}" $(security list-keychain -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          ID="$(security find-identity -v -p codesigning "${KEYCHAIN_PATH}" | sed -n 's/.*"\(Developer ID Application:.*\)".*/\1/p' | head -1)"
          if [[ -z "${ID}" ]]; then
            echo "::error::No Developer ID Application identity after importing .p12"
            exit 1
          fi
          echo "SIGNING_IDENTITY=${ID}" >> "${GITHUB_ENV}"

      - name: Write App Store Connect API key (notarytool)
        if: github.event_name == 'push'
        env:
          APPLE_ASC_API_KEY_P8_BASE64: ${{ secrets.APPLE_ASC_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_ASC_API_KEY_P8_BASE64:-}" ]]; then
            echo "::error::Missing secret APPLE_ASC_API_KEY_P8_BASE64. See scripts/release/README.md"
            exit 1
          fi
          KEY_PATH="${RUNNER_TEMP}/AuthKey.p8"
          echo "${APPLE_ASC_API_KEY_P8_BASE64}" | base64 --decode > "${KEY_PATH}"
          chmod 600 "${KEY_PATH}"
          echo "APPLE_API_KEY_PATH=${KEY_PATH}" >> "${GITHUB_ENV}"
          echo "APPLE_API_KEY_ID=${{ secrets.APPLE_ASC_API_KEY_ID }}" >> "${GITHUB_ENV}"
          echo "APPLE_API_ISSUER_ID=${{ secrets.APPLE_ASC_ISSUER_ID }}" >> "${GITHUB_ENV}"

      - name: Build, sign, notarize (tag v*)
        if: github.event_name == 'push'
        run: scripts/release/macos-build-sign-notarize.sh

      - name: Build unsigned (manual workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: scripts/release/macos-build-sign-notarize.sh --skip-sign --skip-notarize

      - uses: actions/upload-artifact@v4
        with:
          name: sisr-macos-${{ matrix.arch }}
          path: dist/SISR-*.zip
          if-no-files-found: error

  publish-release:
    needs: build-macos
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: sisr-macos-*
          merge-multiple: true
          path: release-zips

      - uses: softprops/action-gh-release@v2
        with:
          files: release-zips/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
